<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <style>
    .nf {
      min-height: 100vh;

      text-align: center;
      padding: 24px;

    <div class="nf__code">4<span class="accent">0</span>4</div>
